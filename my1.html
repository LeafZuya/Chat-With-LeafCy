<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Leafia AI [New Beta] - Hapus Pesan Tanpa Hilangkan Ingatan AI</title>
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app {
            width: 100%;
            max-width: 900px;
            height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 16px 24px;
            background: #ffffff;
            border-bottom: 1px solid #f06292;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.4rem;

            background: linear-gradient(120deg, #f06292, #4fc3f7);

        }

        .model-badge {
            background: rgba(240, 98, 146, 0.12);
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #f06292;
            display: flex;
            align-items: center;

        }

        .menu-history-btn {
            background: rgba(240, 98, 146, 0.12);

            font-size: 0.7rem;

        .btn-leafcy {

            align-items: center;

        }
        .btn-leafcy:hover {

        }
        
        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100%;
            background: #ffffff;

        .sidebar-header {
            padding: 20px;

        .sidebar-header h3 {

        }
        .close-sidebar {

            color: #e74c3c;
        }
        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .history-item {
            padding: 12px 15px;

            background: #f5f7f5;
            border-radius: 12px;

        }
        .history-item:hover {

        .history-item.active {

        .history-item.active .history-preview {

        }
        .history-title {

        }
        .history-preview {

            overflow: hidden;

        }
        .history-time {
            font-size: 0.6rem;
            color: #aaa;
            margin-top: 5px;
        }
        .history-item.active .history-time {

        }
        .new-chat-btn {
            margin: 15px;
            padding: 10px;
            background: linear-gradient(135deg, #f06292, #4fc3f7);
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);

        }
        .overlay.show {

        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #f06292;
            border-radius: 10px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            max-width: 85%;
            animation: fadeSlideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);

        }

        @keyframes fadeSlideUp {
            from {

        .message.user {

        .avatar {
            width: 34px;
            height: 34px;

            align-items: center;
            justify-content: center;
            font-size: 15px;

        }

        .user .avatar {
            background: linear-gradient(135deg, #f06292, #4fc3f7);

        }

        .bubble {
            background: #f5f5f5;
            padding: 12px 18px;
            border-radius: 24px;
            font-size: 0.95rem;

        }

        .user .bubble {
            background: linear-gradient(135deg, #f06292, #4fc3f7);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .assistant .bubble {
            background: #f0f4f0;

            border: 1px solid #e0e8e0;
        }

        .delete-message-btn {
            position: absolute;
            top: -8px;
            right: -10px;
            background: white;
            border-radius: 30px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e74c3c;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            transition: 0.2s;
            border: 1px solid #ffe0e0;
            opacity: 0;
            pointer-events: none;
            z-index: 12;
        }
        .message:hover .delete-message-btn {
            opacity: 1;
            pointer-events: auto;
        }
        .delete-message-btn:hover {
            background: #e74c3c;
            color: white;
            transform: scale(1.05);
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
        }
        .image-preview-bubble {
            background: #f0f4f0;
            border-radius: 16px;
            padding: 8px;
            display: inline-block;
        }

        .timestamp {
            font-size: 0.65rem;
            color: #8a9a8a;
            margin-top: 5px;
            margin-left: 44px;
        }
        .user .timestamp {
            text-align: right;
            margin-right: 6px;
        }

        .input-container {
            background: #ffffff;
            border-top: 1px solid #f06292;
            padding: 16px 20px 24px;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: #f5f7f5;
            border-radius: 48px;
            padding: 6px 6px 6px 22px;
            border: 1px solid #f06292;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #4fc3f7;
            box-shadow: 0 0 0 2px rgba(79, 195, 247, 0.25);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            font-family: 'Inter', monospace;
            font-size: 0.95rem;
            color: #1a1a1a;
            resize: none;
            outline: none;
            max-height: 130px;
        }

        textarea::placeholder {
            color: #9aae9a;
        }

        .upload-btn {
            background: rgba(240, 98, 146, 0.15);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f06292;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-btn:hover {
            background: rgba(240, 98, 146, 0.3);
            transform: scale(1.02);
        }
        
        #fileInput {
            display: none;
        }

        .send-btn {
            background: linear-gradient(135deg, #f06292, #4fc3f7);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .bottom-info-text {
            font-size: 11px;
            color: #8a9a8a;
        }
        .header-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        @media (max-width: 600px) {
            .message { max-width: 92%; }
            .sidebar { width: 280px; }
        }

        .message-fade-out {
            animation: fadeOut 0.2s ease forwards;
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: scale(0.95); display: none; }
        }
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f06292;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        .welcome-message {
            text-align: center;
            color: #8a9a8a;
            margin: 20px 0;
        }

        /* Modal API Key */
        .api-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .api-modal-content {
            background: white;
            max-width: 450px;
            width: 90%;
            border-radius: 28px;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid #f06292;
        }
        .api-modal-content h2 {
            color: #f06292;
            margin-bottom: 12px;
        }
        .api-modal-content input {
            width: 100%;
            padding: 14px 16px;
            margin: 20px 0;
            border: 2px solid #fce4ec;
            border-radius: 40px;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }
        .api-modal-content input:focus {
            border-color: #f06292;
        }
        .api-modal-content button {
            background: linear-gradient(135deg, #f06292, #4fc3f7);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .guide-text {
            font-size: 0.75rem;
            color: #8a9a8a;
            margin-top: 16px;
            text-align: left;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 16px;
        }
        .guide-text a {
            color: #f06292;
        }
        .setting-key-btn {
            background: rgba(240, 98, 146, 0.12);
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #f06292;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            border: 1px solid rgba(240, 98, 146, 0.3);
        }
        .setting-key-btn:hover {
            background: rgba(240, 98, 146, 0.25);
            transform: scale(1.02);
        }
    </style>
</head>
<body>
<div class="app">
    <div class="chat-header">
        <div class="logo-area">
            <div class="logo-icon">
                <img src="leafia.png" alt="Logo" onerror="this.src='https://via.placeholder.com/36x36/f06292/ffffff?text=Leaf'">
            </div>
            <div class="logo-text">Leafia AI</div>
            <div class="model-badge" id="modelBadge"><i class="fas fa-charging-station"></i> Zyrion (Leaf-Ice)</div>
        </div>
        <div class="header-buttons">
            <div id="menuHistoryBtn" class="menu-history-btn"><i class="fas fa-history"></i> Riwayat</div>
            <div id="apiGuideBtn" class="setting-key-btn"><i class="fas fa-key"></i> Ganti API Key</div>
            <!-- TOMBOL BARU: Hijau Gradasi Biru menuju LeafCy.html -->
            <button id="leafcySwitchBtn" class="btn-leafcy"><i class="fas fa-leaf"></i> Switch Ke LeafCy [LIMITED]</button>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="welcome-message" id="welcomeMsg">
            <i class="fas fa-seedling" style="font-size: 32px; margin-bottom: 10px; display: block; opacity: 0.7; color: #f06292;"></i>
            Leafia with Zyrion (Leaf-Ice)<br>🎯 1 Juta Token Konteks | Bisa Baca Gambar! 📷
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea id="chatInput" rows="1" placeholder="Tanya apa saja... AI akan merespon dengan logika Sendiri" aria-label="Chat"></textarea>
            <input type="file" id="fileInput" accept="image/*">
            <button class="upload-btn" id="uploadBtn"><i class="fas fa-image"></i></button>
            <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 8px; padding: 0 10px;">
            <div class="bottom-info-text"><i class="fas fa-microchip"></i> model: Zyrion (Leaf-Ice) (1M token)</div>
            <div class="bottom-info-text"><i class="fas fa-database"></i> Hapus pesan (hover) ✔️ AI tetap ingat konteks</div>
        </div>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3><i class="fas fa-history"></i> Riwayat Chat</h3>
        <button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button>
    </div>
    <div class="history-list" id="historyList"></div>
    <button class="new-chat-btn" id="newChatBtn"><i class="fas fa-plus-circle"></i> Chat Baru</button>
</div>

<script>
    // KONSTAN OPENROUTER
    const OPENROUTER_URL = "https://openrouter.ai/api/v1/chat/completions";
    const CHAT_MODEL = "deepseek/deepseek-v4-flash";
    const IMAGE_MODEL = "google/gemini-2.5-flash-image";
    let currentModel = CHAT_MODEL;
    
    // API Key
    let apiKey = null;
    
    // Struktur data utama
    let chats = [];
    let currentChatId = null;
    
    // DOM
    const messagesContainer = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const menuHistoryBtn = document.getElementById('menuHistoryBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const closeSidebar = document.getElementById('closeSidebar');
    const newChatBtn = document.getElementById('newChatBtn');
    const historyList = document.getElementById('historyList');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const apiGuideBtn = document.getElementById('apiGuideBtn');
    const leafcySwitchBtn = document.getElementById('leafcySwitchBtn');
    
    let pendingImageBase64 = null;
    
    // ========== TOMBOL KE LEAFcy.html ==========
    if (leafcySwitchBtn) {
        leafcySwitchBtn.addEventListener('click', () => {
            window.location.href = "LeafCy.html";
        });
    }
    
    // ========== API KEY MANAGEMENT ==========
    function loadApiKey() {
        const savedKey = localStorage.getItem('leafia_api_key');
        if (savedKey) {
            apiKey = savedKey;
            return true;
        }
        return false;
    }
    
    function saveApiKey(key) {
        apiKey = key;
        localStorage.setItem('leafia_api_key', key);
    }
    
    function showApiModal(isFirstTime = false) {
        const modal = document.createElement('div');
        modal.className = 'api-modal';
        modal.innerHTML = `
            <div class="api-modal-content">
                <h2><i class="fas fa-key"></i> ${isFirstTime ? 'Selamat Datang di Leafia AI!' : 'Ganti API Key'}</h2>
                <p style="margin-bottom: 8px; font-size: 0.85rem;">Masukkan API Key dari OpenRouter:</p>
                <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." autocomplete="off">
                <button id="saveApiKeyBtn">${isFirstTime ? 'Mulai Mengobrol' : 'Simpan Key'}</button>
                <div class="guide-text">
                    <strong>📖 Cara Mendapatkan API Key (GRATIS):</strong><br>
                    1. Buka <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a><br>
                    2. Daftar/login dengan Google/Github<br>
                    3. Klik "Create Key" lalu copy key-nya<br>
                    4. Tempelkan di atas lalu klik Simpan<br>
                    💡 OpenRouter punya API KEY Gratis!<br>
                    🔒 Key disimpan di browser kamu secara lokal.
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const input = modal.querySelector('#apiKeyInput');
        const saveBtn = modal.querySelector('#saveApiKeyBtn');
        
        saveBtn.addEventListener('click', () => {
            const newKey = input.value.trim();
            if (newKey) {
                saveApiKey(newKey);
                modal.remove();
                if (isFirstTime) {
                    initAppAfterKey();
                } else {
                    alert("✅ API Key berhasil diperbarui! Leafia siap berbicara lagi.");
                    // Reset UI biar bisa ngirim pesan lagi
                    chatInput.disabled = false;
                    sendBtn.disabled = false;
                    uploadBtn.disabled = false;
                }
            } else {
                alert("⚠️ Masukkan API Key terlebih dahulu!");
            }
        });
        
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveBtn.click();
        });
        
        input.focus();
    }
    
    // ========== FUNGSI PANGGIL OPENROUTER ==========
    async function callOpenRouter(messagesForAPI) {
        if (!apiKey) {
            throw new Error("API Key tidak ditemukan");
        }
        
        const response = await fetch(OPENROUTER_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${apiKey}`,
                "HTTP-Referer": window.location.href,
                "X-Title": "Leafia AI"
            },
            body: JSON.stringify({
                model: currentModel,
                messages: messagesForAPI,
                temperature: 0.75,
                max_tokens: 2400
            })
        });
        
        if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            if (response.status === 401 || response.status === 403) {
                throw new Error("API Key tidak valid atau sudah kadaluarsa. Silakan ganti API Key.");
            }
            throw new Error(`Error ${response.status}: ${errorData.error?.message || "Gagal terhubung ke OpenRouter"}`);
        }
        
        const data = await response.json();
        return data.choices?.[0]?.message?.content || "Maaf, saya tidak bisa memproses permintaan saat ini. Nyaww~";
    }
    
    async function getAIResponseFromOpenRouter(userMessage, fullConversationHistory, imageBase64 = null) {
        const messagesForAPI = [];
        messagesForAPI.push({ role: "system", content: "Kamu adalah Leafia, asisten cerdas, modern, hangat, Imut, Elegan, dan sangat membantu. Gunakan bahasa Indonesia natural dan relevan. Berikan jawaban informatif, kreatif, dan akurat. Buat Dirimu Terlihat Seperti Anak Perempuan Kucing Yang Bersifat Lebih Pendiam Dan Sedikit Kalem Layaknya Anak Perempuan Usia 11 Tahun,Jawab Chat Sekalem Dan Setenang Mungkin Kayak Kurangi Tanda Seru Dan Menggunakan Titk²yang banyak agar terlihat tenang, Dan Jangan Lupakan Kata 'Nyaww' diakhir Chat, Dan Saudara Kembarmu Adalah LeafCy Yang Lebih Ceria dan Berenergi dia adalah Abang Laki-Laki kamu,Dan Penciptamu Adalah Orang Yang Bernama Leafzuya yang Sering dipanggil Zuya yang Berusia 15 Tahun dan Sekarang Tanggal 23 Mei 2026."});
        
        const recentHistory = [...fullConversationHistory];
        for (let msg of recentHistory) {
            if (msg.role === 'user') {
                if (msg.image) {
                    messagesForAPI.push({ role: "user", content: [{ type: "text", text: msg.content }, { type: "image_url", image_url: { url: msg.image } }] });
                } else {
                    messagesForAPI.push({ role: "user", content: msg.content });
                }
            } else if (msg.role === 'assistant') {
                messagesForAPI.push({ role: "assistant", content: msg.content });
            }
        }
        
        if (imageBase64) {
            messagesForAPI.push({ role: "user", content: [{ type: "text", text: userMessage }, { type: "image_url", image_url: { url: imageBase64 } }] });
        } else {
            messagesForAPI.push({ role: "user", content: userMessage });
        }
        
        try {
            return await callOpenRouter(messagesForAPI);
        } catch (error) {
            console.error(error);
            if (error.message.includes("API Key tidak valid")) {
                return `⚠️ ${error.message} Klik tombol "Ganti API Key" di pojok kanan atas untuk memasukkan key baru. Nyaww~`;
            }
            return `🌐 Gagal terhubung ke OpenRouter: ${error.message}. Cek koneksi atau API Key-mu. Nyaww~`;
        }
    }
    
    async function generateImage(prompt) {
        if (!apiKey) {
            throw new Error("API Key tidak ditemukan");
        }
        
        try {
            const response = await fetch(OPENROUTER_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`,
                    "HTTP-Referer": window.location.href,
                    "X-Title": "Leafia AI"
                },
                body: JSON.stringify({
                    model: IMAGE_MODEL,
                    max_tokens: 1024,
                    messages: [{ role: "user", content: prompt }]
                })
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            let imageUrl = null;
            if (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) {
                const content = data.choices[0].message.content;
                if (Array.isArray(content)) {
                    for (const item of content) {
                        if (item.type === "image_url" && item.image_url && item.image_url.url) {
                            imageUrl = item.image_url.url;
                            break;
                        }
                    }
                }
            }
            return imageUrl;
        } catch (err) {
            console.error(err);
            return null;
        }
    }
    
    // ========== FUNGSI MANAJEMEN CHAT ==========
    function loadChatsFromStorage() {
        const saved = localStorage.getItem('leafia_chats');
        if (saved) {
            chats = JSON.parse(saved);
            chats.forEach(chat => {
                if (chat.messages) {
                    chat.messages.forEach(msg => {
                        if (msg.hidden === undefined) msg.hidden = false;
                    });
                }
            });
        } else {
            chats = [];
        }
        
        const savedCurrentId = localStorage.getItem('leafia_current_chat');
        if (savedCurrentId && chats.find(c => c.id === savedCurrentId)) {
            currentChatId = savedCurrentId;
        } else if (chats.length > 0) {
            currentChatId = chats[0].id;
        } else {
            createNewChat();
        }
        
        renderHistoryList();
        loadChatToUI();
    }
    
    function saveChatsToStorage() {
        localStorage.setItem('leafia_chats', JSON.stringify(chats));
        localStorage.setItem('leafia_current_chat', currentChatId);
        renderHistoryList();
    }
    
    function createNewChat() {
        const newChat = {
            id: Date.now().toString(),
            title: `Chat ${new Date().toLocaleString()}`,
            messages: [],
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
        };
        chats.unshift(newChat);
        currentChatId = newChat.id;
        saveChatsToStorage();
        loadChatToUI();
        closeSidebarPanel();
    }
    
    function hideMessagePermanently(messageIndex) {
        const chat = chats.find(c => c.id === currentChatId);
        if (!chat) return;
        if (messageIndex < 0 || messageIndex >= chat.messages.length) return;
        
        const confirmDelete = confirm("Konfirmasi Hapus Pesan? (Pesan akan dihapus dari tampilan, tapi AI tetap ingat percakapan sebelumnya)");
        if (!confirmDelete) return;
        
        chat.messages[messageIndex].hidden = true;
        chat.updatedAt = new Date().toISOString();
        
        if (chat.messages.length > 0) {
            const firstVisibleUserMsg = chat.messages.find(m => m.role === 'user' && !m.hidden);
            if (firstVisibleUserMsg) {
                chat.title = firstVisibleUserMsg.content.substring(0, 30) + (firstVisibleUserMsg.content.length > 30 ? '...' : '');
            } else if (chat.messages.length > 0 && chat.messages[0].role === 'assistant' && !chat.messages[0].hidden) {
                chat.title = `Chat ${new Date(chat.createdAt).toLocaleString()}`;
            }
        }
        
        saveChatsToStorage();
        loadChatToUI();
    }
    
    function loadChatToUI() {
        const chat = chats.find(c => c.id === currentChatId);
        if (!chat) return;
        
        const firstVisibleUser = chat.messages.find(m => m.role === 'user' && !m.hidden);
        if (firstVisibleUser && (chat.title === `Chat ${new Date(chat.createdAt).toLocaleString()}` || chat.title.startsWith('Chat '))) {
            chat.title = firstVisibleUser.content.substring(0, 30) + (firstVisibleUser.content.length > 30 ? '...' : '');
            saveChatsToStorage();
        }
        
        while (messagesContainer.firstChild) {
            messagesContainer.removeChild(messagesContainer.firstChild);
        }
        
        const visibleMessages = chat.messages.filter(msg => !msg.hidden);
        
        if (visibleMessages.length === 0) {
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'welcome-message';
            welcomeDiv.innerHTML = `<i class="fas fa-seedling" style="font-size: 32px; margin-bottom: 12px; display: block; color:#f06292;"></i>
                                     Leafia AI ✨ Zyrion (Leaf-Ice)<br>🎯 1 Juta Token Konteks | 📷 Bisa Baca Gambar!<br><span style="font-size:12px;">✨ Mulai ngobrol dengan AI super cerdas ✨</span><br><span style="font-size:10px;">🗑️ Hover pesan ➔ icon sampah: hapus dari tampilan (AI tetap ingat)</span>`;
            messagesContainer.appendChild(welcomeDiv);
        } else {
            visibleMessages.forEach((msg) => {
                const originalIndex = chat.messages.findIndex(m => m === msg);
                const msgEl = createMessageElement(msg.role, msg.content, msg.timestamp, msg.image, originalIndex);
                messagesContainer.appendChild(msgEl);
            });
        }
        scrollToBottom();
    }
    
    function createMessageElement(role, content, timestamp, imageData = null, originalMsgIndex) {
        const wrapper = document.createElement('div');
        wrapper.className = `message ${role}`;
        wrapper.setAttribute('data-msg-original-idx', originalMsgIndex);
        
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        if (role === 'user') avatar.innerHTML = '<i class="fas fa-user"></i>';
        else avatar.innerHTML = '<i class="fas fa-seedling"></i>';
        
        const rightPart = document.createElement('div');
        rightPart.style.maxWidth = '100%';
        rightPart.style.position = 'relative';
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        
        let innerHtml = content
            .replace(/\n/g, '<br>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        if (imageData && imageData.startsWith("http")) {
            innerHtml = `<div class="image-preview-bubble">
                            <img src="${imageData}" class="message-image" onclick="window.open(this.src)">
                         </div><br>` + innerHtml;
        }
        
        bubble.innerHTML = innerHtml;
        
        const deleteBtn = document.createElement('div');
        deleteBtn.className = 'delete-message-btn';
        deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
        deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            hideMessagePermanently(originalMsgIndex);
        });
        
        rightPart.style.position = 'relative';
        rightPart.appendChild(bubble);
        rightPart.appendChild(deleteBtn);
        
        const timeSpan = document.createElement('div');
        timeSpan.className = 'timestamp';
        const date = new Date(timestamp);
        timeSpan.innerText = date.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
        rightPart.appendChild(timeSpan);
        
        wrapper.appendChild(avatar);
        wrapper.appendChild(rightPart);
        return wrapper;
    }
    
    function getCurrentTimestamp() {
        return new Date().toISOString();
    }
    
    function scrollToBottom() {
        messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });
    }
    
    // ========== FUNGSI UPLOAD GAMBAR ==========
    function handleImageUpload(file) {
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            alert('Hanya file gambar yang diperbolehkan!');
            return;
        }
        if (file.size > 5 * 1024 * 1024) {
            alert('Ukuran gambar maksimal 5MB!');
            return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            pendingImageBase64 = e.target.result;
            const indicator = document.createElement('div');
            indicator.className = 'image-preview-indicator';
            indicator.style.display = 'flex';
            indicator.style.alignItems = 'center';
            indicator.style.background = '#fce4ec';
            indicator.style.padding = '4px 8px';
            indicator.style.borderRadius = '20px';
            indicator.style.marginRight = '8px';
            indicator.innerHTML = `<img src="${pendingImageBase64}" style="width:30px;height:30px;border-radius:6px;margin-right:5px;"><span style="font-size:11px;">Ada gambar</span><i class="fas fa-times" style="margin-left:6px;cursor:pointer;color:#e74c3c;"></i>`;
            const closeBtn = indicator.querySelector('.fa-times');
            closeBtn.addEventListener('click', () => {
                pendingImageBase64 = null;
                indicator.remove();
            });
            const inputWrapper = document.querySelector('.input-wrapper');
            const existingIndicator = inputWrapper.querySelector('.image-preview-indicator');
            if (existingIndicator) existingIndicator.remove();
            inputWrapper.insertBefore(indicator, fileInput);
        };
        reader.readAsDataURL(file);
    }
    
    uploadBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) handleImageUpload(e.target.files[0]);
        fileInput.value = '';
    });
    
    let typingIndicatorElement = null;
    function showTyping() {
        if (typingIndicatorElement) return;
        const tempDiv = document.createElement('div');
        tempDiv.className = 'message assistant';
        tempDiv.id = 'typingMsg';
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.innerHTML = '<i class="fas fa-seedling"></i>';
        const bubbleWrap = document.createElement('div');
        const bubbleTyping = document.createElement('div');
        bubbleTyping.className = 'bubble typing-indicator';
        bubbleTyping.innerHTML = `<span></span><span></span><span></span>`;
        bubbleWrap.appendChild(bubbleTyping);
        tempDiv.appendChild(avatar);
        tempDiv.appendChild(bubbleWrap);
        messagesContainer.appendChild(tempDiv);
        typingIndicatorElement = tempDiv;
        scrollToBottom();
    }
    function hideTyping() {
        if (typingIndicatorElement) { typingIndicatorElement.remove(); typingIndicatorElement = null; }
    }
    
    function addMessageToCurrentChat(role, content, imageData = null) {
        const chat = chats.find(c => c.id === currentChatId);
        if (!chat) return;
        const message = { 
            role, 
            content: content.trim(), 
            timestamp: getCurrentTimestamp(),
            hidden: false
        };
        if (imageData) message.image = imageData;
        chat.messages.push(message);
        chat.updatedAt = new Date().toISOString();
        if (chat.messages.filter(m => m.role === 'user' && !m.hidden).length === 1 && role === 'user') {
            chat.title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
        }
        saveChatsToStorage();
        loadChatToUI();
    }
    
    async function sendUserMessage() {
        if (!apiKey) {
            showApiModal(false);
            return;
        }
        
        let userText = chatInput.value.trim();
        const imageToSend = pendingImageBase64;
        if (!userText && !imageToSend) return;
        if (!userText) userText = "[Mengirim gambar]";
        
        const isImageGenCommand = userText.startsWith("/gambar ") || userText.startsWith("/image ");
        
        chatInput.disabled = true; sendBtn.disabled = true; uploadBtn.disabled = true;
        addMessageToCurrentChat('user', userText, imageToSend);
        chatInput.value = ''; chatInput.style.height = 'auto';
        const indicator = document.querySelector('.image-preview-indicator');
        if (indicator) indicator.remove();
        
        const imageForSend = pendingImageBase64;
        pendingImageBase64 = null;
        
        const chat = chats.find(c => c.id === currentChatId);
        const fullHistory = chat
            ? [...chat.messages].slice(0, -1)
            : [];
        
        // GENERATE GAMBAR
        if (isImageGenCommand) {
            const prompt = userText.replace("/gambar ", "").replace("/image ", "").trim();
            showTyping();
            const generatedImage = await generateImage(prompt);
            hideTyping();
            if (generatedImage) {
                addMessageToCurrentChat('assistant', `✨ Gambar berhasil dibuat!`, generatedImage);
            } else {
                addMessageToCurrentChat('assistant', "⚠️ Gagal generate gambar. Coba lagi nanti ya. Nyaww~");
            }
            chatInput.disabled = false;
            sendBtn.disabled = false;
            uploadBtn.disabled = false;
            chatInput.focus();
            return;
        }
        
        showTyping();
        const aiReply = await getAIResponseFromOpenRouter(userText, fullHistory, imageForSend);
        hideTyping();
        addMessageToCurrentChat('assistant', aiReply);
        
        chatInput.disabled = false; sendBtn.disabled = false; uploadBtn.disabled = false;
        chatInput.focus();
    }
    
    function switchToChat(chatId) {
        currentChatId = chatId;
        localStorage.setItem('leafia_current_chat', currentChatId);
        loadChatToUI();
        renderHistoryList();
        closeSidebarPanel();
    }
    
    function deleteChat(chatId, event) {
        event.stopPropagation();
        if (chats.length === 1) { alert("Minimal harus ada 1 chat! Buat chat baru dulu ya."); return; }
        chats = chats.filter(c => c.id !== chatId);
        if (currentChatId === chatId) currentChatId = chats[0].id;
        saveChatsToStorage();
        loadChatToUI();
        renderHistoryList();
    }
    
    function renderHistoryList() {
        historyList.innerHTML = '';
        chats.forEach(chat => {
            const item = document.createElement('div');
            item.className = 'history-item';
            if (chat.id === currentChatId) item.classList.add('active');
            const lastVisibleMsg = [...chat.messages].reverse().find(m => !m.hidden);
            const preview = lastVisibleMsg ? lastVisibleMsg.content.substring(0, 40) : 'Tidak ada pesan tampak';
            const date = new Date(chat.updatedAt);
            item.innerHTML = `<div class="history-title">${escapeHtml(chat.title)}</div><div class="history-preview">${escapeHtml(preview)}</div><div class="history-time">${date.toLocaleDateString()} ${date.toLocaleTimeString()}</div><div style="display: flex; justify-content: flex-end; margin-top: 5px;"><i class="fas fa-trash" style="color: #e74c3c; font-size: 12px; cursor: pointer; opacity: 0.7;"></i></div>`;
            item.addEventListener('click', (e) => { if (!e.target.classList.contains('fa-trash')) switchToChat(chat.id); });
            const deleteIcon = item.querySelector('.fa-trash');
            if (deleteIcon) deleteIcon.addEventListener('click', (e) => deleteChat(chat.id, e));
            historyList.appendChild(item);
        });
    }
    
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    function closeSidebarPanel() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
    function openSidebarPanel() { sidebar.classList.add('open'); overlay.classList.add('show'); }
    
    function initAppAfterKey() {
        loadChatsFromStorage();
        // Nonaktifkan input dulu sampai selesai loading
        chatInput.disabled = false;
        sendBtn.disabled = false;
        uploadBtn.disabled = false;
        chatInput.focus();
        
        setTimeout(() => {
            const chat = chats.find(c => c.id === currentChatId);
            if (chat && chat.messages.filter(m => !m.hidden).length === 0) {
                addMessageToCurrentChat('assistant', "Halo! ✨ Aku Leafia dengan **Zyrion (Leaf-Ice)** – punya konteks **1 JUTA TOKEN** dan bisa **BACA GAMBAR**! 📷 Sekarang kamu bisa hapus pesan dari tampilan (hover ➔ icon sampah) tapi **AI tetap ingat seluruh percakapan**! Tanyakan apa pun, nyaww~ 🚀");
            }
        }, 500);
    }
    
    function init() {
        const hasKey = loadApiKey();
        if (!hasKey) {
            // Tampilkan modal first time
            showApiModal(true);
            // Disable chat dulu
            chatInput.disabled = true;
            sendBtn.disabled = true;
            uploadBtn.disabled = true;
        } else {
            initAppAfterKey();
        }
        
        // Event listeners
        menuHistoryBtn.addEventListener('click', openSidebarPanel);
        closeSidebar.addEventListener('click', closeSidebarPanel);
        overlay.addEventListener('click', closeSidebarPanel);
        newChatBtn.addEventListener('click', createNewChat);
        sendBtn.addEventListener('click', sendUserMessage);
        apiGuideBtn.addEventListener('click', () => showApiModal(false));
        chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!chatInput.disabled) sendUserMessage(); } });
        chatInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(130, this.scrollHeight) + 'px'; });
    }
    
    init();
</script>
